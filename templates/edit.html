<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Edit Student</h1>

    <form method="POST">

        <input type="text"
        name="name"
        value="{{ student[1] }}"
        required>

        <br><br>

        <input type="text"
        name="rollno"
        value="{{ student[2] }}"
        required>

        <br><br>

        <input type="text"
        name="department"
        value="{{ student[3] }}"
        required>

        <br><br>

        <input type="number"
        name="marks"
        value="{{ student[4] }}"
        required>

        <br><br>

        <button type="submit">
            Update Student
        </button>

    </form>

</div>

</body>
</html>
