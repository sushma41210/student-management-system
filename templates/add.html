<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Add Student</h1>

    <form method="POST">

        <input type="text"
        name="name"
        placeholder="Enter Name"
        required>

        <br><br>

        <input type="text"
        name="rollno"
        placeholder="Enter Roll Number"
        required>

        <br><br>

        <input type="text"
        name="department"
        placeholder="Enter Department"
        required>

        <br><br>

        <input type="number"
        name="marks"
        placeholder="Enter Marks"
        required>

        <br><br>

        <button type="submit">
            Add Student
        </button>

    </form>

</div>

</body>
</html>
