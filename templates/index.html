<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Student Management System</h1>
    <form method="GET" action="/">

    <input type="text"
    name="search"
    placeholder="Search Student Name">

    <br><br>

    <button type="submit">
        Search
    </button>

</form>

<br>

    <a href="/add">
        <button>Add Student</button>
    </a>

    <br><br>

    <table border="1" width="100%">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Department</th>
            <th>Marks</th>
            <th>Action</th>
        </tr>

        {% for student in students %}

        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>
           <td>

    <a href="/edit/{{ student[0] }}">
        <button>Edit</button>
    </a>

    <a href="/delete/{{ student[0] }}">
        <button>Delete</button>
    </a>

</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
